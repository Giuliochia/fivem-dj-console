<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM DJ Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="dj-console" class="hidden">

    <!-- HEADER -->
    <div class="dj-header">
        <div class="header-left">
            <span class="header-icon">🎧</span>
            <span class="header-title">PIONIEREE</span>
        </div>

        <div class="header-right">
            <span class="header-clock" id="clock-display">--:--</span>
            <span class="header-connected">● CONNECTED</span>
            <button class="header-close" onclick="closeConsole()">✕</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="dj-main">

        <!-- DECK A -->
        <div class="deck deck-a">
            <div class="deck-badge">A</div>
            <div class="track-header">
                <div class="track-thumb" id="thumb-a">♪</div>
                <div class="track-meta">
                    <div class="track-name" id="track-name-a">NO TRACK</div>
                    <div class="track-sub">--</div>
                </div>
                <div class="bpm-block">
                    <span class="bpm-num" id="bpm-a">--</span>
                    <span class="bpm-unit">BPM</span>
                    <button class="tap-btn" onclick="tapBPM('A')">TAP</button>
                </div>
            </div>

            <div class="time-row">
                <span id="time-a">0:00</span>
                <span class="time-sep"> / <span id="dur-a">--:--</span></span>
            </div>

            <div class="waveform-wrap">
                <canvas id="waveform-a" class="waveform-canvas" width="380" height="52"></canvas>
            </div>

            <div class="transport-row">
                <button class="btn-cue btn-transport">CUE</button>
                <button class="btn-playpause btn-transport" id="play-a" onclick="togglePlay('A')">▶/II</button>
                <button class="btn-stop btn-transport" onclick="stopDeck('A')">STOP</button>
            </div>

            <div class="vinyl-area">
                <div class="turntable" id="turntable-a">
                    <div class="vinyl">
                        <div class="vinyl-inner">
                            <div class="vinyl-bpm" id="bpm-vinyl-a">--</div>
                            <div class="vinyl-bpm-label">BPM</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="url-row">
                <input type="text" id="url-a" class="url-input" placeholder="URL stream / YouTube..." list="history-a" autocomplete="off">
                <datalist id="history-a"></datalist>
            </div>

            <div class="deck-bottom">
                <div class="hotcue-section">
                    <div class="sec-label">HOT CUE</div>
                    <div class="hotcue-grid">
                        <button class="hc-btn" id="hc-a-1" onclick="triggerHotCue('A',1)" oncontextmenu="clearHotCue('A',1);return false">1</button>
                        <button class="hc-btn" id="hc-a-2" onclick="triggerHotCue('A',2)" oncontextmenu="clearHotCue('A',2);return false">2</button>
                        <button class="hc-btn" id="hc-a-3" onclick="triggerHotCue('A',3)" oncontextmenu="clearHotCue('A',3);return false">3</button>
                        <button class="hc-btn" id="hc-a-4" onclick="triggerHotCue('A',4)" oncontextmenu="clearHotCue('A',4);return false">4</button>
                        <button class="hc-btn" id="hc-a-5" onclick="triggerHotCue('A',5)" oncontextmenu="clearHotCue('A',5);return false">5</button>
                        <button class="hc-btn" id="hc-a-6" onclick="triggerHotCue('A',6)" oncontextmenu="clearHotCue('A',6);return false">6</button>
                        <button class="hc-btn" id="hc-a-7" onclick="triggerHotCue('A',7)" oncontextmenu="clearHotCue('A',7);return false">7</button>
                        <button class="hc-btn" id="hc-a-8" onclick="triggerHotCue('A',8)" oncontextmenu="clearHotCue('A',8);return false">8</button>
                    </div>
                </div>
                <div class="loop-deck">
                    <div class="sec-label">LOOP</div>
                    <div class="loop-io">
                        <button class="loop-io-btn">IN</button>
                        <button class="loop-io-btn">OUT</button>
                    </div>
                    <div class="loop-sizes">
                        <button class="loop-btn" onclick="setLoop(1,'A',this)">1</button>
                        <button class="loop-btn" onclick="setLoop(0.5,'A',this)">½</button>
                        <button class="loop-btn" onclick="setLoop(0.25,'A',this)">¼</button>
                        <button class="loop-btn" onclick="setLoop(0.125,'A',this)">⅛</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MIXER -->
        <div class="mixer-panel">
            <div class="fader-row">
                <div class="ch-strip">
                    <div class="vu-col" id="vu-a">
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                    </div>
                    <input type="range" class="ch-fader" id="vol-a" min="0" max="100" value="80" oninput="updateDeckVolume('A',this.value)">
                </div>

                <div class="master-strip">
                    <div class="master-lbl">MASTER</div>
                    <div class="master-coverage">◎ <span id="cf-pos">CENTER</span></div>
                    <input type="range" class="master-fader" id="master-vol" min="0" max="100" value="80" oninput="updateMasterVolume(this.value)">
                    <div class="coverage-hint">VOL = RAGGIO</div>
                </div>

                <div class="ch-strip">
                    <div class="vu-col" id="vu-b">
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                        <div class="vu-bar"></div><div class="vu-bar"></div>
                    </div>
                    <input type="range" class="ch-fader" id="vol-b" min="0" max="100" value="80" oninput="updateDeckVolume('B',this.value)">
                </div>
            </div>

            <div class="cf-section">
                <span class="cf-lbl">A &lt;</span>
                <input type="range" class="crossfader" id="crossfader" min="0" max="100" value="50" oninput="updateCrossfader(this.value)">
                <span class="cf-lbl">&gt; B</span>
            </div>

        </div>

        <!-- DECK B -->
        <div class="deck deck-b">
            <div class="deck-badge">B</div>
            <div class="track-header">
                <div class="track-thumb" id="thumb-b">♪</div>
                <div class="track-meta">
                    <div class="track-name" id="track-name-b">NO TRACK</div>
                    <div class="track-sub">--</div>
                </div>
                <div class="bpm-block">
                    <span class="bpm-num" id="bpm-b">--</span>
                    <span class="bpm-unit">BPM</span>
                    <button class="tap-btn" onclick="tapBPM('B')">TAP</button>
                </div>
            </div>

            <div class="time-row">
                <span id="time-b">0:00</span>
                <span class="time-sep"> / <span id="dur-b">--:--</span></span>
            </div>

            <div class="waveform-wrap">
                <canvas id="waveform-b" class="waveform-canvas" width="380" height="52"></canvas>
            </div>

            <div class="transport-row">
                <button class="btn-cue btn-transport">CUE</button>
                <button class="btn-playpause btn-transport" id="play-b" onclick="togglePlay('B')">▶/II</button>
                <button class="btn-stop btn-transport" onclick="stopDeck('B')">STOP</button>
            </div>

            <div class="vinyl-area">
                <div class="turntable" id="turntable-b">
                    <div class="vinyl">
                        <div class="vinyl-inner">
                            <div class="vinyl-bpm" id="bpm-vinyl-b">--</div>
                            <div class="vinyl-bpm-label">BPM</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="url-row">
                <input type="text" id="url-b" class="url-input" placeholder="URL stream / YouTube..." list="history-b" autocomplete="off">
                <datalist id="history-b"></datalist>
            </div>

            <div class="deck-bottom">
                <div class="hotcue-section">
                    <div class="sec-label">HOT CUE</div>
                    <div class="hotcue-grid">
                        <button class="hc-btn" id="hc-b-1" onclick="triggerHotCue('B',1)" oncontextmenu="clearHotCue('B',1);return false">1</button>
                        <button class="hc-btn" id="hc-b-2" onclick="triggerHotCue('B',2)" oncontextmenu="clearHotCue('B',2);return false">2</button>
                        <button class="hc-btn" id="hc-b-3" onclick="triggerHotCue('B',3)" oncontextmenu="clearHotCue('B',3);return false">3</button>
                        <button class="hc-btn" id="hc-b-4" onclick="triggerHotCue('B',4)" oncontextmenu="clearHotCue('B',4);return false">4</button>
                        <button class="hc-btn" id="hc-b-5" onclick="triggerHotCue('B',5)" oncontextmenu="clearHotCue('B',5);return false">5</button>
                        <button class="hc-btn" id="hc-b-6" onclick="triggerHotCue('B',6)" oncontextmenu="clearHotCue('B',6);return false">6</button>
                        <button class="hc-btn" id="hc-b-7" onclick="triggerHotCue('B',7)" oncontextmenu="clearHotCue('B',7);return false">7</button>
                        <button class="hc-btn" id="hc-b-8" onclick="triggerHotCue('B',8)" oncontextmenu="clearHotCue('B',8);return false">8</button>
                    </div>
                </div>
                <div class="loop-deck">
                    <div class="sec-label">LOOP</div>
                    <div class="loop-io">
                        <button class="loop-io-btn">IN</button>
                        <button class="loop-io-btn">OUT</button>
                    </div>
                    <div class="loop-sizes">
                        <button class="loop-btn" onclick="setLoop(1,'B',this)">1</button>
                        <button class="loop-btn" onclick="setLoop(0.5,'B',this)">½</button>
                        <button class="loop-btn" onclick="setLoop(0.25,'B',this)">¼</button>
                        <button class="loop-btn" onclick="setLoop(0.125,'B',this)">⅛</button>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /dj-main -->

    <!-- BOTTOM -->
    <div class="dj-bottom">
        <div class="sampler-panel">
            <div class="panel-lbl">SAMPLER</div>
            <div class="sampler-grid">
                <button class="smp-btn" onclick="playSample('scratch')">SCRATCH</button>
                <button class="smp-btn" onclick="playSample('airhorn')">AIR HORN</button>
                <button class="smp-btn" onclick="playSample('drop')">DROP</button>
                <button class="smp-btn" onclick="playSample('stab')">STAB</button>
                <button class="smp-btn" onclick="playSample('woosh')">WOOSH</button>
                <button class="smp-btn" onclick="playSample('laser')">LASER</button>
                <button class="smp-btn" onclick="playSample('alarm')">ALARM</button>
                <button class="smp-btn" onclick="playSample('rewind')">REWIND</button>
            </div>
        </div>

        <div class="sampler-panel sampler-panel-extra">
            <div class="panel-lbl">SAMPLER 2</div>
            <div class="sampler-grid">
                <button class="smp-btn" onclick="playSample('kick')">KICK</button>
                <button class="smp-btn" onclick="playSample('snare')">SNARE</button>
                <button class="smp-btn" onclick="playSample('hat')">HAT</button>
                <button class="smp-btn" onclick="playSample('clap')">CLAP</button>
                <button class="smp-btn" onclick="playSample('riser')">RISER</button>
                <button class="smp-btn" onclick="playSample('impact')">IMPACT</button>
                <button class="smp-btn" onclick="playSample('beep')">BEEP</button>
                <button class="smp-btn" onclick="playSample('sub')">SUB</button>
            </div>
        </div>
    </div>

    <!-- YouTube containers -->
    <div id="yt-player-a" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></div>
    <div id="yt-player-b" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></div>

</div><!-- /dj-console -->
<script src="app.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
